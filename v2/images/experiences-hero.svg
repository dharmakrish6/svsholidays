<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgE" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10142A"/>
      <stop offset="100%" stop-color="#3A1018"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bgE)"/>
  <!-- large mandala rings -->
  <g fill="none" stroke="#D4A24C" opacity="0.1">
    <circle cx="400" cy="500" r="350"/>
    <circle cx="400" cy="500" r="280"/>
    <circle cx="400" cy="500" r="200"/>
    <circle cx="400" cy="500" r="120"/>
  </g>
  <!-- radial lines -->
  <g stroke="#D4A24C" stroke-width="0.8" opacity="0.08">
    <line x1="400" y1="150" x2="400" y2="850"/>
    <line x1="50" y1="500" x2="750" y2="500"/>
    <line x1="153" y1="253" x2="647" y2="747"/>
    <line x1="647" y1="253" x2="153" y2="747"/>
  </g>
  <!-- petal shapes suggesting lotus -->
  <g fill="#D4A24C" opacity="0.07">
    <ellipse cx="400" cy="300" rx="40" ry="100"/>
    <ellipse cx="400" cy="700" rx="40" ry="100"/>
    <ellipse cx="200" cy="500" rx="100" ry="40"/>
    <ellipse cx="600" cy="500" rx="100" ry="40"/>
  </g>
  <!-- centre motif -->
  <circle cx="400" cy="500" r="30" fill="#D4A24C" opacity="0.25"/>
  <circle cx="400" cy="500" r="10" fill="#D4A24C" opacity="0.6"/>
</svg>
